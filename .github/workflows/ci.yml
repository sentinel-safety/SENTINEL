name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.11"

jobs:
  lint:
    name: Lint + type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .

  security:
    name: Security audits
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - name: Scan tracked files for secrets
        run: |
          uv run detect-secrets-hook --baseline .secrets.baseline \
            $(git ls-files | grep -Ev '^(uv\.lock|coverage\.xml|\.secrets\.baseline)$')
      - name: Audit dependencies for known CVEs
        run: |
          uv export --format requirements-txt --no-hashes --no-emit-project -o /tmp/requirements.txt
                    uv run pip-audit --strict --no-deps --disable-pip --ignore-vuln CVE-2026-3219 -r /tmp/requirements.txt

  test-unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run pytest tests/unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage.xml

  test-smoke:
    name: Smoke tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run pytest tests/smoke --no-cov

  test-integration:
    name: Integration tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: apache/age:release_PG16_1.5.0
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_dev  # pragma: allowlist secret
          POSTGRES_DB: sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
    env:
      SENTINEL_ENV: test
      SENTINEL_POSTGRES_DSN: postgresql+asyncpg://sentinel_app:sentinel_app_dev@127.0.0.1:5432/sentinel  # pragma: allowlist secret
      SENTINEL_POSTGRES_SYNC_DSN: postgresql+psycopg://sentinel:sentinel_dev@127.0.0.1:5432/sentinel  # pragma: allowlist secret
      SENTINEL_REDIS_DSN: redis://127.0.0.1:6379/0
      SENTINEL_QDRANT_URL: http://127.0.0.1:6333
      PGPASSWORD: sentinel_dev
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Bootstrap database roles and extensions
        run: psql -h 127.0.0.1 -U sentinel -d sentinel -v ON_ERROR_STOP=1 -f infra/docker/postgres/init.sql
      - name: Apply Alembic migrations
        run: uv run alembic upgrade head
      - run: uv run pytest tests/integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage.xml
