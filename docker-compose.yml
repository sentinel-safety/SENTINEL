name: sentinel

x-service-env: &service-env
  SENTINEL_ENV: ${SENTINEL_ENV:-dev}
  SENTINEL_LOG_LEVEL: ${SENTINEL_LOG_LEVEL:-INFO}
  SENTINEL_POSTGRES_DSN: postgresql+asyncpg://sentinel_app:sentinel_app_dev@postgres:5432/sentinel
  SENTINEL_POSTGRES_SYNC_DSN: postgresql+psycopg://sentinel:sentinel_dev@postgres:5432/sentinel
  SENTINEL_REDIS_DSN: redis://redis:6379/0
  SENTINEL_QDRANT_URL: http://qdrant:6333
  SENTINEL_OTLP_ENDPOINT: http://jaeger:4317

x-service-deps: &service-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  postgres:
    build:
      context: ./infra/docker/postgres
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev
      POSTGRES_DB: sentinel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: sentinel-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sentinel-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: sentinel-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:14269/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_MODULE: services.gateway.app
        SERVICE_PORT: "8000"
    container_name: sentinel-gateway
    environment: *service-env
    depends_on: *service-deps
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_MODULE: services.ingestion.app
        SERVICE_PORT: "8001"
    container_name: sentinel-ingestion
